<!-- ===== NAV ===== -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <img class="brand-icon" src="assets/qodalis-icon.svg" alt="Qodalis" />
      <span class="brand-text">Qodalis <strong>CLI</strong></span>
    </div>
    <div class="nav-links">
      <a
        routerLink="/docs"
        class="nav-link"
        >{{ 'nav.docs' | translate }}</a
      >
      <a
        href="https://www.npmjs.com/package/@qodalis/cli"
        target="_blank"
        rel="noopener"
        class="nav-link"
        >{{ 'nav.npm' | translate }}</a
      >
      <a
        href="https://github.com/qodalis-solutions/web-cli"
        target="_blank"
        rel="noopener"
        class="nav-link gh-link"
        >{{ 'nav.github' | translate }} <span class="arrow">&nearr;</span></a
      >
      <div class="lang-switcher" (click)="$event.stopPropagation()">
        <button class="lang-btn" (click)="toggleLangDropdown()">
          <span class="lang-code">{{ currentLang.code.toUpperCase() }}</span>
          <span class="lang-chevron" [class.open]="langDropdownOpen">&#9662;</span>
        </button>
        <div class="lang-dropdown" *ngIf="langDropdownOpen">
          <button
            *ngFor="let lang of languages"
            class="lang-option"
            [class.active]="lang.code === currentLang.code"
            (click)="switchLang(lang)"
          >
            <span class="lang-option-native">{{ lang.nativeName }}</span>
            <span class="lang-option-name">{{ lang.name }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <div class="section-inner footer-inner">
    <span class="footer-brand">{{ 'footer.brand' | translate }}</span>
    <span class="footer-copy">{{ 'footer.copy' | translate }}</span>
    <div class="footer-links">
      <a href="https://qodalis.com" target="_blank" rel="noopener"
        >qodalis.com</a
      >
      <a
        href="https://github.com/qodalis-solutions/web-cli"
        target="_blank"
        rel="noopener"
        >GitHub</a
      >
    </div>
  </div>
</footer>

<!-- ===== PANEL (collapsible bottom) ===== -->
<cli-panel [options]="options" [modules]="modules" />
