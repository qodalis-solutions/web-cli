<!-- Hide tab (shown when panel is hidden) -->
<button
  *ngIf="visible && isHidden"
  class="cli-panel-hide-tab"
  [attr.data-position]="position"
  [attr.data-hide-align]="hideAlignment"
  [ngStyle]="themeStyles"
  title="Show CLI"
  (click)="unhideTerminal()"
>
  <svg
    class="cli-panel-hide-tab-icon"
    width="16"
    height="16"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <polyline points="4 17 10 11 4 5" />
    <line x1="12" y1="19" x2="20" y2="19" />
  </svg>
  <span class="cli-panel-hide-tab-label">CLI</span>
  <svg
    class="cli-panel-hide-tab-arrow"
    width="14"
    height="14"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- bottom: chevron up -->
    <polyline *ngIf="position === 'bottom'" points="18 15 12 9 6 15" />
    <!-- top: chevron down -->
    <polyline *ngIf="position === 'top'" points="6 9 12 15 18 9" />
    <!-- left: chevron right -->
    <polyline *ngIf="position === 'left'" points="9 18 15 12 9 6" />
    <!-- right: chevron left -->
    <polyline *ngIf="position === 'right'" points="15 6 9 12 15 18" />
  </svg>
</button>

<!-- Main panel (kept in DOM when hidden to preserve terminal state) -->
<div
  *ngIf="visible"
  class="terminal-wrapper"
  [style.display]="isHidden ? 'none' : ''"
  [class.collapsed]="isCollapsed"
  [class.maximized]="isMaximized"
  [class.resizing]="isResizing"
  [attr.data-position]="position"
  [attr.data-resizable]="resizable"
  [attr.data-closable]="closable"
  [attr.data-hideable]="hideable"
  [ngStyle]="wrapperStyle"
>
  <div class="terminal-header">
    <div class="resize-bar" (mousedown)="onResizeStart($event)">
      <div class="resize-grip"></div>
    </div>
    <div class="header-content">
      <p class="terminal-title">
        <svg
          class="title-icon"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="4 17 10 11 4 5" />
          <line x1="12" y1="19" x2="20" y2="19" />
        </svg>
        CLI
      </p>
      <div class="action-buttons">
        <!-- Position dropdown -->
        <div class="panel-btn-position-wrapper" (click)="$event.stopPropagation()">
          <button
            class="panel-btn panel-btn-position"
            title="Move panel"
            (click)="togglePositionDropdown($event)"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <!-- bottom -->
              <rect *ngIf="position === 'bottom'" x="4" y="15" width="16" height="5" rx="1" fill="currentColor" stroke="none" opacity="0.5" />
              <!-- top -->
              <rect *ngIf="position === 'top'" x="4" y="4" width="16" height="5" rx="1" fill="currentColor" stroke="none" opacity="0.5" />
              <!-- left -->
              <rect *ngIf="position === 'left'" x="4" y="4" width="5" height="16" rx="1" fill="currentColor" stroke="none" opacity="0.5" />
              <!-- right -->
              <rect *ngIf="position === 'right'" x="15" y="4" width="5" height="16" rx="1" fill="currentColor" stroke="none" opacity="0.5" />
            </svg>
          </button>
          <div class="position-dropdown" *ngIf="positionDropdownOpen">
            <button
              class="position-dropdown-item"
              [class.active]="position === 'bottom'"
              (click)="selectPosition('bottom')"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <rect x="4" y="15" width="16" height="5" rx="1" fill="currentColor" stroke="none" opacity="0.6" />
              </svg>
              Bottom
            </button>
            <button
              class="position-dropdown-item"
              [class.active]="position === 'top'"
              (click)="selectPosition('top')"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <rect x="4" y="4" width="16" height="5" rx="1" fill="currentColor" stroke="none" opacity="0.6" />
              </svg>
              Top
            </button>
            <button
              class="position-dropdown-item"
              [class.active]="position === 'left'"
              (click)="selectPosition('left')"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <rect x="4" y="4" width="5" height="16" rx="1" fill="currentColor" stroke="none" opacity="0.6" />
              </svg>
              Left
            </button>
            <button
              class="position-dropdown-item"
              [class.active]="position === 'right'"
              (click)="selectPosition('right')"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <rect x="15" y="4" width="5" height="16" rx="1" fill="currentColor" stroke="none" opacity="0.6" />
              </svg>
              Right
            </button>
          </div>
        </div>

        <!-- Hide button -->
        <button
          *ngIf="hideable"
          class="panel-btn panel-btn-hide"
          title="Hide"
          (click)="hideTerminal()"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="18" x2="19" y2="18" />
            <polyline points="9 14 12 17 15 14" />
          </svg>
        </button>

        <button
          class="panel-btn"
          [title]="!isMaximized ? 'Maximize' : 'Restore'"
          [disabled]="isCollapsed"
          (click)="toggleMaximizationTerminal()"
        >
          <svg
            *ngIf="!isMaximized"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 3 21 3 21 9" />
            <polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
          <svg
            *ngIf="isMaximized"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="4 14 10 14 10 20" />
            <polyline points="20 10 14 10 14 4" />
            <line x1="14" y1="10" x2="21" y2="3" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
        </button>

        <button
          class="panel-btn"
          [title]="isCollapsed ? 'Expand' : 'Collapse'"
          (click)="toggleTerminal()"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline *ngIf="position === 'bottom' && isCollapsed" points="18 15 12 9 6 15" />
            <polyline *ngIf="position === 'bottom' && !isCollapsed" points="6 9 12 15 18 9" />
            <polyline *ngIf="position === 'top' && isCollapsed" points="6 9 12 15 18 9" />
            <polyline *ngIf="position === 'top' && !isCollapsed" points="18 15 12 9 6 15" />
            <polyline *ngIf="position === 'left' && isCollapsed" points="9 18 15 12 9 6" />
            <polyline *ngIf="position === 'left' && !isCollapsed" points="15 6 9 12 15 18" />
            <polyline *ngIf="position === 'right' && isCollapsed" points="15 6 9 12 15 18" />
            <polyline *ngIf="position === 'right' && !isCollapsed" points="9 18 15 12 9 6" />
          </svg>
        </button>

        <button class="panel-btn panel-btn-close" title="Close" (click)="closeTerminal()">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div class="terminal-content" [style.display]="isCollapsed ? 'none' : ''">
    <ng-content></ng-content>
  </div>
</div>
