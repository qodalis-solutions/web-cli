  <body>
    <app-root>
      <!-- Loader: removed automatically when Angular bootstraps -->
      <style>
        .app-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #070b14;
          z-index: 9999;
          gap: 28px;
        }
        .app-loader-terminal {
          width: 280px;
          background: #0d1117;
          border: 1px solid #1e293b;
          border-radius: 10px;
          overflow: hidden;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .app-loader-titlebar {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: 10px 14px;
          background: #111827;
          border-bottom: 1px solid #1e293b;
        }
        .app-loader-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
        }
        .app-loader-dot:nth-child(1) { background: #ef4444; }
